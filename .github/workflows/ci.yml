name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: go_lang_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: checkout
        uses: actions/checkout@v7

      - name: setup-go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: download modules
        run: go mod download

      - name: verify modules
        run: go mod verify

      - name: build
        run: go build ./...

      - name: vet
        run: go vet ./...

      - name: test
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/go_lang_test?sslmode=disable
        run: go test -race -count=1 ./...

      - name: coverage
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/go_lang_test?sslmode=disable
        run: |
          go test -count=1 -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out | tail -1

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v7

      - name: setup-go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: download modules
        run: go mod download

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m

  build:
    name: build
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - name: checkout
        uses: actions/checkout@v7

      - name: setup-go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: download modules
        run: go mod download

      - name: build binary
        run: go build -o api ./cmd/api

      - name: upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: api-binary
          path: api
          retention-days: 7

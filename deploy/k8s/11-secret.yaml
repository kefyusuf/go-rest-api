apiVersion: v1
kind: Secret
metadata:
  name: go-rest-api-secrets
  namespace: go-rest-api
type: Opaque
stringData:
  # Override in production. Generate with:
  #   openssl rand -base64 48
  JWTSecret: "change-me-to-a-long-random-secret-of-at-least-32-bytes"

  # Connection string for the production database.
  # Format: postgres://user:password@host:port/db?sslmode=require
  DATABASE_URL: "postgres://postgres:postgres@postgres:5432/go_lang?sslmode=disable"

  # Connection string for the production cache.
  # Format: redis://[user:password@]host:port/db
  REDIS_URL: "redis://redis:6379/0"

apiVersion: v1
kind: ConfigMap
metadata:
  name: go-rest-api-config
  namespace: go-rest-api
data:
  APP_ENV: "production"
  PORT: "8080"
  READ_HEADER_TIMEOUT: "5s"
  READ_TIMEOUT: "15s"
  WRITE_TIMEOUT: "15s"
  IDLE_TIMEOUT: "60s"
  MAX_HEADER_BYTES: "1048576"
  MAX_BODY_BYTES: "1048576"
  SHUTDOWN_TIMEOUT: "30s"
  RATE_LIMIT_PER_SECOND: "20"
  RATE_LIMIT_BURST: "40"
  AUTH_RATE_LIMIT_PER_SECOND: "5"
  AUTH_RATE_LIMIT_BURST: "10"
  USER_CACHE_TTL: "5m"
  IDEMPOTENCY_TTL: "24h"
  GIN_MODE: "release"

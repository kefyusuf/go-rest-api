basePath: /
definitions:
  go-lang_internal_model.CreateUserRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        type: string
    type: object
  go-lang_internal_model.ErrorDetail:
    properties:
      code:
        type: string
      details:
        additionalProperties:
          items:
            type: string
          type: array
        type: object
      message:
        type: string
    type: object
  go-lang_internal_model.ErrorResponse:
    properties:
      error:
        $ref: '#/definitions/go-lang_internal_model.ErrorDetail'
    type: object
  go-lang_internal_model.ForgotPasswordRequest:
    properties:
      email:
        type: string
    type: object
  go-lang_internal_model.ForgotPasswordResponse:
    properties:
      accepted:
        type: boolean
      expiresAt:
        type: string
      resetUrl:
        type: string
      token:
        type: string
    type: object
  go-lang_internal_model.HealthResponse:
    properties:
      message:
        type: string
      status:
        type: string
    type: object
  go-lang_internal_model.ListUsersMeta:
    properties:
      limit:
        type: integer
      nextCursor:
        type: string
    type: object
  go-lang_internal_model.ListUsersResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/go-lang_internal_model.User'
        type: array
      meta:
        $ref: '#/definitions/go-lang_internal_model.ListUsersMeta'
    type: object
  go-lang_internal_model.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  go-lang_internal_model.LoginResponse:
    properties:
      accessToken:
        type: string
      expiresAt:
        type: string
      expiresIn:
        type: integer
      refreshExpiresAt:
        type: string
      refreshToken:
        type: string
      tokenType:
        type: string
      user:
        $ref: '#/definitions/go-lang_internal_model.User'
    type: object
  go-lang_internal_model.RefreshRequest:
    properties:
      refreshToken:
        type: string
    type: object
  go-lang_internal_model.ResetPasswordRequest:
    properties:
      password:
        type: string
      token:
        type: string
    type: object
  go-lang_internal_model.UpdateUserRequest:
    properties:
      email:
        type: string
      name:
        type: string
    type: object
  go-lang_internal_model.User:
    properties:
      email:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: A clean and beginner-friendly Go API skeleton.
  title: Go API Starter
  version: "1.0"
paths:
  /auth/forgot-password:
    post:
      consumes:
      - application/json
      description: |-
        Always returns 202 to avoid leaking which emails are registered. In this
        in-memory starter the response includes the reset token directly; a
        production deployment would email it to the user instead.
      parameters:
      - description: Forgot password request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/go-lang_internal_model.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/go-lang_internal_model.ForgotPasswordResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
        "415":
          description: Unsupported Media Type
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
      summary: Forgot password
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user with email and password, returns JWT access
        and refresh tokens
      parameters:
      - description: Login credentials
        in: body
        name: credentials
        required: true
        schema:
          $ref: '#/definitions/go-lang_internal_model.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-lang_internal_model.LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
        "415":
          description: Unsupported Media Type
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
      summary: Login
      tags:
      - auth
  /auth/logout:
    post:
      description: Revokes the bearer token used in this request
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Logout
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Trades a valid refresh token for a new access token (and a new
        refresh token)
      parameters:
      - description: Refresh token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/go-lang_internal_model.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-lang_internal_model.LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
      summary: Refresh
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Creates a new user and returns a JWT access token
      parameters:
      - description: New account
        in: body
        name: credentials
        required: true
        schema:
          $ref: '#/definitions/go-lang_internal_model.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/go-lang_internal_model.LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
        "415":
          description: Unsupported Media Type
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
      summary: Register
      tags:
      - auth
  /auth/reset-password:
    post:
      consumes:
      - application/json
      description: Resets a user's password using a valid reset token
      parameters:
      - description: Reset password request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/go-lang_internal_model.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
        "415":
          description: Unsupported Media Type
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
      summary: Reset password
      tags:
      - auth
  /health:
    get:
      description: Confirms that the application is running
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-lang_internal_model.HealthResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
      summary: Health check
      tags:
      - health
  /me:
    get:
      description: Returns the user behind a valid bearer token
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-lang_internal_model.User'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Current user
      tags:
      - auth
  /users:
    get:
      description: Lists all users
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-lang_internal_model.ListUsersResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
      summary: List users
      tags:
      - users
    post:
      consumes:
      - application/json
      description: Creates a new user
      parameters:
      - description: New user
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/go-lang_internal_model.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/go-lang_internal_model.User'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
      summary: Create user
      tags:
      - users
  /users/{id}:
    delete:
      description: Deletes a user
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
      summary: Delete user
      tags:
      - users
    get:
      description: Returns a user by id
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-lang_internal_model.User'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
      summary: Get user by ID
      tags:
      - users
    put:
      consumes:
      - application/json
      description: Updates an existing user
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated user
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/go-lang_internal_model.UpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-lang_internal_model.User'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
      summary: Update user
      tags:
      - users
swagger: "2.0"

basePath: /
definitions:
  go-lang_internal_model.CreateUserRequest:
    properties:
      email:
        type: string
      name:
        type: string
    type: object
  go-lang_internal_model.ErrorDetail:
    properties:
      code:
        type: string
      details:
        additionalProperties:
          items:
            type: string
          type: array
        type: object
      message:
        type: string
    type: object
  go-lang_internal_model.ErrorResponse:
    properties:
      error:
        $ref: '#/definitions/go-lang_internal_model.ErrorDetail'
    type: object
  go-lang_internal_model.HealthResponse:
    properties:
      message:
        type: string
      status:
        type: string
    type: object
  go-lang_internal_model.ListUsersMeta:
    properties:
      limit:
        type: integer
      nextCursor:
        type: string
    type: object
  go-lang_internal_model.ListUsersResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/go-lang_internal_model.User'
        type: array
      meta:
        $ref: '#/definitions/go-lang_internal_model.ListUsersMeta'
    type: object
  go-lang_internal_model.UpdateUserRequest:
    properties:
      email:
        type: string
      name:
        type: string
    type: object
  go-lang_internal_model.User:
    properties:
      email:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: A clean and beginner-friendly Go API skeleton.
  title: Go API Starter
  version: "1.0"
paths:
  /health:
    get:
      description: Confirms that the application is running
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-lang_internal_model.HealthResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
      summary: Health check
      tags:
      - health
  /users:
    get:
      description: Lists all users
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-lang_internal_model.ListUsersResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
      summary: List users
      tags:
      - users
    post:
      consumes:
      - application/json
      description: Creates a new user
      parameters:
      - description: New user
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/go-lang_internal_model.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/go-lang_internal_model.User'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
      summary: Create user
      tags:
      - users
  /users/{id}:
    delete:
      description: Deletes a user
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
      summary: Delete user
      tags:
      - users
    get:
      description: Returns a user by id
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-lang_internal_model.User'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
      summary: Get user by ID
      tags:
      - users
    put:
      consumes:
      - application/json
      description: Updates an existing user
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated user
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/go-lang_internal_model.UpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-lang_internal_model.User'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/go-lang_internal_model.ErrorResponse'
      summary: Update user
      tags:
      - users
swagger: "2.0"
